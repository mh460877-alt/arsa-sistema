<div class="app-wrap">

  <!-- TOPBAR -->
  <nav class="topbar">
    <div class="tb-logo">
      <img src="https://aguasrionegrinas.com/wp-content/uploads/2018/05/logo.png"
           alt="Aguas Rionegrinas" class="tb-logo-img">
    </div>
    <div class="tb-divider"></div>
    <span class="tb-subtitle">Sistema de Gestión de Personas</span>
    <div class="tb-right">
      <span class="tb-user">{{ usuario?.nombre }}</span>
      <div class="tb-avatar">{{ usuario?.nombre?.charAt(0) }}</div>
      <button class="tb-exit" (click)="salir()">Salir</button>
    </div>
  </nav>

  <!-- LAYOUT -->
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div *ngFor="let seccion of seccionesMenu">
        <div class="sb-section">{{ seccion.nombre }}</div>

        <div *ngFor="let item of seccion.items"
             class="sb-item"
             [class.active]="rutaActual === item.ruta"
             [class.locked]="item.bloqueado"
             (click)="navegar(item)">

          <svg *ngIf="item.icon==='dashboard'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          <svg *ngIf="item.icon==='nomina'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <svg *ngIf="item.icon==='relevamiento'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14,2 14,8 20,8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          <svg *ngIf="item.icon==='descriptivos'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
          <svg *ngIf="item.icon==='procedimientos'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <polyline points="9,11 12,14 22,4"/>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
          <svg *ngIf="item.icon==='organigrama'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="4" r="2"/>
            <path d="M12 6v4M8 14H4v-2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2h-4"/>
            <circle cx="8" cy="17" r="2"/>
            <circle cx="16" cy="17" r="2"/>
          </svg>
          <svg *ngIf="item.icon==='usuarios'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <svg *ngIf="item.icon==='capacitacion'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>

          <span class="sb-label">{{ item.label }}</span>
          <span *ngIf="item.bloqueado" class="sb-badge">PRONTO</span>
        </div>
      </div>
    </aside>

    <!-- CONTENIDO -->
    <main class="main">
      <router-outlet />
    </main>

  </div>
</div>

<div class="notif" [class.show]="notifVisible">{{ notifMsg }}</div>
